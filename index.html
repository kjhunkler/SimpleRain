<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#12121f" />
  <title>SimpleRain</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/lotus.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/lotus.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <section id="screen-loading" class="screen active">
      <div id="home-online-pads" class="home-online-pills" aria-label="Online players"></div>
      <h1 class="title">Simple<span>Rain</span></h1>
      <p class="tagline">A quiet pond game for solo play or shared lobbies.</p>
      <p id="connection-status" class="status">Choose how to play.</p>
      <div id="home-lobby-controls" class="home-lobby-controls">
        <button id="btn-continue-game" class="btn btn-big hidden" type="button">Continue</button>
        <button id="btn-play-solo" class="btn btn-primary btn-big" type="button">Solo</button>
        <section class="home-section" aria-labelledby="flower-lobbies-title">
          <div class="home-section-header">
            <h2 id="flower-lobbies-title">Flower Lobbies</h2>
            <button id="btn-refresh-lobbies" class="btn btn-small" type="button">Refresh</button>
          </div>
          <div id="flower-lobby-list" class="flower-lobby-list" aria-live="polite"></div>
        </section>
        <section class="home-section" aria-labelledby="code-lobbies-title">
          <h2 id="code-lobbies-title">Host or Join by Code</h2>
          <div class="home-join-code">
            <input id="input-home-lobby-code" class="text-input" type="text" autocomplete="off" inputmode="text" maxlength="4" placeholder="Code" aria-label="Invite code" />
            <button id="btn-home-join-lobby" class="btn" type="button">Join/Host</button>
          </div>
        </section>
      </div>
      <button id="btn-home-profile" class="player-profile-btn home-profile-btn" aria-label="Edit profile" type="button"></button>
    </section>

    <section id="screen-play" class="screen">
      <div class="play-menu-bar" aria-label="SimpleRain controls">
        <button id="btn-leave-lobby-top" class="menu-icon-btn leave-top-btn" aria-label="Leave lobby" type="button">←</button>
        <ul id="player-list" class="player-list"></ul>
        <button id="btn-profile" class="player-profile-btn" aria-label="Edit profile" type="button"></button>
      </div>
      <canvas id="stage"></canvas>
    </section>
  </div>

  <div id="sheet-profile" class="sheet" aria-hidden="true">
    <div class="sheet-header">
      <h2>Settings</h2>
      <button id="btn-close-profile" class="close-btn" aria-label="Close" type="button">x</button>
    </div>
    <div class="profile-edit-card">
      <div class="profile-preview-main">
        <div id="preview-dot" class="preview-dot"></div>
      </div>
      <div class="field-group profile-name-field">
        <label for="input-name">Name</label>
        <input id="input-name" type="text" class="text-input" maxlength="20" autocomplete="off" />
      </div>
      <div class="field-group profile-compact-field">
        <label for="input-color">Color</label>
        <input id="input-color" class="profile-color-input" type="color" />
      </div>
      <div class="field-group profile-compact-field">
        <label for="input-icon">Icon</label>
        <input id="input-icon" type="text" class="text-input emoji-input" maxlength="8" autocomplete="off" inputmode="text" />
      </div>
    </div>
    <div class="profile-shortcuts">
      <h3>Quick Colors</h3>
      <div id="profile-color-shortcuts" class="shortcut-row"></div>
    </div>
    <div class="profile-shortcuts">
      <h3>Pond Friends</h3>
      <div id="profile-icon-shortcuts" class="shortcut-row"></div>
    </div>
    <div class="manage-group">
      <h3>Online Players</h3>
      <div id="sheet-online-players" class="online-player-list"></div>
    </div>
    <div class="manage-group">
      <h3>Game</h3>
      <div id="lobby-options-controls" class="lobby-controls">
        <div class="music-picker" id="music-picker">
          <button id="btn-music-picker" class="manage-btn music-picker-toggle" type="button" aria-expanded="false">Music</button>
          <div id="music-picker-menu" class="music-picker-menu" aria-label="Music tracks"></div>
        </div>
        <button id="btn-reset" class="manage-btn" type="button">Reset Game</button>
        <button id="btn-leave-lobby" class="manage-btn danger" type="button">Leave Lobby</button>
      </div>
    </div>
    <div class="manage-group">
      <h3>Lobby</h3>
      <div id="lobby-active-controls" class="lobby-controls">
        <div class="invite-panel" aria-label="Lobby invite">
          <div class="invite-code-row">
            <span>Invite Code</span>
            <strong id="invite-code">simple-rain</strong>
          </div>
          <div class="invite-qr-wrap">
            <img id="invite-qr" class="invite-qr" alt="Lobby invite QR code" />
          </div>
          <label class="invite-link-label" for="invite-link">Invite Link</label>
          <input id="invite-link" class="text-input invite-link-input" type="text" readonly />
          <div class="invite-actions">
            <button id="btn-copy-invite" class="manage-btn" type="button">Copy Link</button>
            <button id="btn-share-invite" class="manage-btn" type="button">Share via Text</button>
          </div>
        </div>
      </div>
    </div>
    <div class="manage-group app-update-group">
      <div class="version-row">
        <span id="menu-version" class="menu-version"></span>
        <button id="btn-refresh-cache" class="manage-btn" type="button">Refresh Cached PWA Files</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="js/peer-net.js?v=1.1.9"></script>
  <script src="js/games/simple-rain.js?v=1.1.9"></script>
  <script src="js/app.js?v=1.1.9"></script>
</body>
</html>
