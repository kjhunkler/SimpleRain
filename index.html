<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#12121f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Simple Games" />
    <meta name="description" content="A pocket arcade of touch-friendly mini games. Works offline!" />
    <title>Simple Games</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />
    <link rel="stylesheet" href="css/app.css" />
</head>
<body>
    <div id="app">
        <!-- ===== Profile select ===== -->
        <section id="screen-profiles" class="screen">
            <header class="screen-header center">
                <h1 class="app-title">Simple Games</h1>
                <p class="subtitle">Who's playing?</p>
            </header>
            <div id="profile-list" class="profile-list"></div>
            <button id="btn-add-profile" class="btn btn-primary btn-big">+ New Player</button>
        </section>

        <!-- ===== Profile create/edit ===== -->
        <section id="screen-profile-edit" class="screen hidden">
            <header class="screen-header row">
                <button id="btn-cancel-profile" class="btn btn-icon btn-ghost" aria-label="Back">&#8592;</button>
                <h2 id="profile-edit-title">New Player</h2>
            </header>
            <label class="field-label" for="profile-name">Name</label>
            <input id="profile-name" type="text" maxlength="14" autocomplete="off" placeholder="Player name" />
            <label class="field-label">Pick an avatar</label>
            <div id="avatar-grid" class="avatar-grid"></div>
            <button id="btn-kids-toggle" class="kids-toggle" type="button" aria-pressed="false">
                <span class="kids-toggle-info">
                    <span class="kids-toggle-title">&#129528; Kids Mode</span>
                    <span class="kids-toggle-sub">Slower speeds &amp; extra hearts</span>
                </span>
                <span class="kids-switch"><span class="kids-knob"></span></span>
            </button>
            <button id="btn-save-profile" class="btn btn-primary btn-big">Save</button>
            <button id="btn-delete-profile" class="btn btn-danger btn-big hidden">Delete Player</button>
        </section>

        <!-- ===== Home / game picker ===== -->
        <section id="screen-home" class="screen hidden">
            <header class="screen-header row space-between">
                <h1 class="app-title small">Simple Games</h1>
                <div class="header-actions">
                    <button id="btn-sound" class="btn btn-icon btn-ghost" aria-label="Toggle sound">&#128266;</button>
                    <button id="btn-switch-profile" class="profile-chip" aria-label="Switch player">
                        <span id="chip-avatar" class="chip-avatar"></span>
                        <span id="chip-name"></span>
                        <span class="chip-switch">&#8645;</span>
                    </button>
                </div>
            </header>
            <h2 class="section-title">Pick a game</h2>
            <div id="game-filters" class="game-filters"></div>
            <div id="game-sections"></div>
        </section>

        <!-- ===== Game host ===== -->
        <section id="screen-game" class="screen game-screen hidden">
            <header class="game-header">
                <button id="btn-exit-game" class="btn btn-icon btn-ghost" aria-label="Exit game">&#8592;</button>
                <div class="game-stats">
                    <span id="game-score">0</span>
                    <span id="game-best">Best 0</span>
                </div>
                <span id="game-title" class="game-title-label"></span>
                <span id="game-kids-badge" class="kids-badge hidden">&#129528; Kids</span>
            </header>
            <div id="game-stage" class="game-stage">
                <canvas id="game-canvas"></canvas>
                <div id="game-overlay" class="overlay hidden">
                    <div class="overlay-card">
                        <div id="overlay-emoji">&#127918;</div>
                        <h2 id="overlay-title">Game Over</h2>
                        <p id="overlay-text"></p>
                        <div id="overlay-badge" class="badge-new hidden">&#11088; New high score!</div>
                        <button id="btn-overlay-retry" class="btn btn-primary btn-big">Play Again</button>
                        <button id="btn-overlay-share" class="btn btn-ghost btn-big hidden">&#128242; Text my score</button>
                        <button id="btn-overlay-home" class="btn btn-ghost btn-big">Home</button>
                    </div>
                </div>
                <div id="game-confirm" class="overlay hidden">
                    <div class="overlay-card">
                        <div class="overlay-emoji">&#128682;</div>
                        <h2 class="overlay-title">Quit game?</h2>
                        <p class="overlay-text">Your score will be saved to your best.</p>
                        <button id="btn-confirm-stay" class="btn btn-primary btn-big">Keep Playing</button>
                        <button id="btn-confirm-quit" class="btn btn-ghost btn-big">Quit Game</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div id="update-banner" class="update-banner hidden" role="alert">
        <span class="update-text">&#10024; A new version is ready!</span>
        <div class="update-actions">
            <button id="btn-update-now" class="btn btn-primary">Refresh</button>
            <button id="btn-update-later" class="btn btn-ghost">Later</button>
        </div>
    </div>

    <div id="toast" class="toast" role="status"></div>

    <script src="js/storage.js"></script>
    <script src="js/sound.js"></script>
    <script src="js/games/snake.js"></script>
    <script src="js/games/astro.js"></script>
    <script src="js/games/piestack.js"></script>
    <script src="js/games/flappy.js"></script>
    <script src="js/games/moles.js"></script>
    <script src="js/games/memory.js"></script>
    <script src="js/games/echo.js"></script>
    <script src="js/games/bricks.js"></script>
    <script src="js/games/hopper.js"></script>
    <script src="js/games/fruit.js"></script>
    <script src="js/games/tiles.js"></script>
    <script src="js/games/colorrush.js"></script>
    <script src="js/games/beatloop.js"></script>
    <script src="js/games/taptiles.js"></script>
    <script src="js/games/stopspin.js"></script>
    <script src="js/games/lanedash.js"></script>
    <script src="js/games/stormquest.js"></script>
    <script src="js/games/sentry.js"></script>
    <script src="js/games/bughunt.js"></script>
    <script src="js/games/digger.js"></script>
    <script src="js/games/catcher.js"></script>
    <script src="js/games/turtlecave.js"></script>
    <script src="js/games/abctrace.js"></script>
    <script src="js/games/lettersiege.js"></script>
    <script src="js/games/watchswap.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
